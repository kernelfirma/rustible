  tasks:
    - name: Ensure benchmark directory
      file:
        path: "{{ bench_dir }}"
        state: directory
        mode: '0755'

    - name: Copy benchmark files
      copy:
        content: "benchmark {{ item }}"
        dest: "{{ bench_dir }}/{{ item }}.txt"
        mode: '0644'
      loop: "{{ files }}"

    - name: Cleanup benchmark directory
      file:
        path: "{{ bench_dir }}"
        state: absent
