---
- name: Create slurm group
  group:
    name: "{{ slurm_group }}"
    gid: "{{ slurm_gid }}"
    state: present

- name: Create slurm user
  user:
    name: "{{ slurm_user }}"
    uid: "{{ slurm_uid }}"
    group: "{{ slurm_group }}"
    home: /var/lib/slurm
    shell: /sbin/nologin
    system: true
    state: present

- name: Install Slurm controller packages
  package:
    name: "{{ item }}"
    state: present
  loop: "{{ slurm_controller_packages }}"

- name: Create Slurm directories
  file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ slurm_user }}"
    group: "{{ slurm_group }}"
    mode: "{{ item.mode }}"
  loop:
    - { path: "{{ slurm_conf_dir }}", mode: "0755" }
    - { path: "{{ slurm_spool_dir }}", mode: "0755" }
    - { path: "{{ slurm_spool_dir }}/ctld", mode: "0755" }
    - { path: "{{ slurm_log_dir }}", mode: "0755" }

- name: Deploy slurm.conf
  template:
    src: slurm.conf.j2
    dest: "{{ slurm_conf_dir }}/slurm.conf"
    owner: "{{ slurm_user }}"
    group: "{{ slurm_group }}"
    mode: "0644"
  notify: Restart slurmctld

- name: Deploy cgroup.conf
  template:
    src: cgroup.conf.j2
    dest: "{{ slurm_conf_dir }}/cgroup.conf"
    owner: "{{ slurm_user }}"
    group: "{{ slurm_group }}"
    mode: "0644"
  notify: Restart slurmctld

- name: Enable and start slurmctld
  service:
    name: slurmctld
    state: started
    enabled: true
