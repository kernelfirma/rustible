name: Performance Benchmarks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      save_baseline:
        description: 'Save results as baseline'
        required: false
        default: 'false'
        type: boolean
      baseline_name:
        description: 'Baseline name (if saving)'
        required: false
        default: 'manual'
        type: string

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -C target-cpu=native

jobs:
  benchmark:
    name: Benchmark (${{ matrix.suite.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        suite:
          - id: performance
            name: Performance
            bench: performance_benchmark
            log: benchmark_performance.log
          - id: callback
            name: Callback
            bench: callback_benchmark
            log: benchmark_callback.log
          - id: sprint2
            name: Sprint2
            bench: sprint2_feature_benchmark
            log: benchmark_sprint2.log

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-bench-
            ${{ runner.os }}-cargo-

      - name: Download baseline (if exists)
        uses: actions/cache@v4
        id: baseline-cache
        with:
          path: .criterion-baseline
          key: benchmark-baseline-${{ matrix.suite.id }}-${{ github.base_ref || 'main' }}
          restore-keys: |
            benchmark-baseline-${{ matrix.suite.id }}-main

      - name: Restore baseline
        if: steps.baseline-cache.outputs.cache-hit == 'true'
        run: |
          if [ -d ".criterion-baseline" ]; then
            mkdir -p target/criterion
            cp -r .criterion-baseline/* target/criterion/ || true
            echo "Baseline restored"
          fi

      - name: Run benchmark suite
        id: run-bench
        timeout-minutes: 20
        run: |
          cargo bench --bench ${{ matrix.suite.bench }} -- --verbose 2>&1 | tee ${{ matrix.suite.log }}

      - name: Check for regressions
        id: regression-check
        if: always()
        run: |
          # Parse benchmark logs for regression indicators
          REGRESSIONS=0

          LOG="${{ matrix.suite.log }}"
          if [ -f "$LOG" ] && grep -q "Performance has regressed" "$LOG"; then
            echo "::warning::Regression detected in $LOG"
            grep "Performance has regressed" "$LOG" || true
            REGRESSIONS=1
          fi

          echo "regressions=$REGRESSIONS" >> $GITHUB_OUTPUT

          if [ $REGRESSIONS -gt 0 ]; then
            echo "::warning::$REGRESSIONS performance regression(s) detected"
          fi

      - name: Generate benchmark summary
        if: always()
        run: |
          echo "## ${{ matrix.suite.name }} Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Suite" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          grep -E "^(Benchmarking|test |time:)" "${{ matrix.suite.log }}" | head -50 >> $GITHUB_STEP_SUMMARY || echo "No results" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.regression-check.outputs.regressions }}" != "0" ]; then
            echo "### Regressions Detected" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "#### ${{ matrix.suite.log }}" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            grep -A2 "Performance has regressed" "${{ matrix.suite.log }}" >> $GITHUB_STEP_SUMMARY || true
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Save baseline (main branch only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          mkdir -p .criterion-baseline
          cp -r target/criterion/* .criterion-baseline/ || true

      - name: Cache new baseline
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/cache/save@v4
        with:
          path: .criterion-baseline
          key: benchmark-baseline-${{ matrix.suite.id }}-main-${{ github.sha }}

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ matrix.suite.id }}-${{ github.sha }}
          path: |
            target/criterion/
            ${{ matrix.suite.log }}
          retention-days: 30

      - name: Upload HTML reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-html-reports-${{ matrix.suite.id }}-${{ github.sha }}
          path: target/criterion/report/
          retention-days: 30

  benchmark-comparison:
    name: Ansible Comparison (Manual)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Ansible
        run: |
          pip install ansible

      - name: Build Rustible
        run: |
          cargo build --release

      - name: Note about comparison benchmarks
        run: |
          echo "Ansible comparison benchmarks require real infrastructure."
          echo "See benches/comparison/README.md for setup instructions."
          echo ""
          echo "To run locally:"
          echo "  cd benches/comparison"
          echo "  ./run_benchmark.sh"
