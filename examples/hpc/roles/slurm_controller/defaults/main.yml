---
slurm_conf_dir: /etc/slurm
slurm_spool_dir: /var/spool/slurm
slurm_log_dir: /var/log/slurm
slurm_pid_dir: /run/slurm
slurm_user: slurm
slurm_group: slurm
slurm_uid: 1002
slurm_gid: 1002

slurm_controller_packages:
  - slurm-slurmctld
  - slurm-slurmdbd
  - slurm-client

slurm_dbd_enabled: false
slurm_accounting_storage: none
