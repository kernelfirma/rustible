---
all:
  vars:
    ansible_user: hpcadmin
    cluster_name: cloud-burst-hpc
    cluster_domain: hpc.cloud
    nfs_server: "{{ hostvars['controller01']['ansible_host'] }}"
    nfs_shared_home: /home
    nfs_shared_opt: /opt/hpc

  children:
    controller:
      vars:
        cloud_provider: onprem
        ansible_ssh_private_key_file: ~/.ssh/hpc_cluster
      hosts:
        controller01:
          ansible_host: 10.0.10.11
          slurm_role: controller

    compute:
      vars:
        cloud_provider: aws
        ansible_ssh_private_key_file: ~/.ssh/hpc_aws
        slurm_role: compute
        ansible_user: ec2-user
      hosts:
        # Populated dynamically by AWS provisioning or inventory plugin.
        # Static entries shown for reference / testing:
        compute-aws-01:
          ansible_host: 172.31.1.10
          instance_type: c5.2xlarge
          gpu_enabled: false
        compute-aws-02:
          ansible_host: 172.31.1.11
          instance_type: c5.2xlarge
          gpu_enabled: false
        compute-aws-03:
          ansible_host: 172.31.1.12
          instance_type: p3.2xlarge
          gpu_enabled: true
          gpu_type: nvidia
        compute-aws-04:
          ansible_host: 172.31.1.13
          instance_type: p3.2xlarge
          gpu_enabled: true
          gpu_type: nvidia

    slurm_nodes:
      children:
        controller: {}
        compute: {}

    cluster:
      children:
        controller: {}
        compute: {}
